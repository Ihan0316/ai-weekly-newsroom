name: Daily digest

on:
  schedule:
    - cron: '23 22 * * *'   # 22:23 UTC = 07:23 KST (매일). 혼잡 슬롯(:00·:30, 0시 UTC) 회피용 애매한 분/시
  workflow_dispatch:        # 수동 실행 / 누락일 백필
    inputs:
      date:
        description: "백필할 날짜 YYYY-MM-DD (비우면 오늘). 퀴즈 없는 날이면 퀴즈만 보충"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run daily pipeline (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Seoul
          PIPELINE_DATE: ${{ github.event.inputs.date }}
        run: python pipeline_gemini.py

      - name: Export Naver copy page
        env:
          TZ: Asia/Seoul
        run: python naver_export.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "Daily auto: add $(TZ=Asia/Seoul date +%F) issue" -m "Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>"
            git push
          fi
