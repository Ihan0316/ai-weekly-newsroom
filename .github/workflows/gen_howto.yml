name: Generate how-to

# 주제 하나로 네이버 검색최적화 how-to/가이드 글 1편 생성 → data/howto 커밋. 수동 실행 전용.
# 이후 로컬: git pull → python naver_publish.py --howto data/howto/<파일>.json --blog-id aijnj123
on:
  workflow_dispatch:
    inputs:
      topic:
        description: "how-to 주제 (예: GPT-5.6 처음 쓰는 법)"
        required: true
        default: ""

permissions:
  contents: write

concurrency:
  group: gen-howto
  cancel-in-progress: false

jobs:
  howto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate how-to
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Seoul
          TOPIC: ${{ github.event.inputs.topic }}
        run: python gen_howto.py "$TOPIC"

      - name: Commit & push
        env:
          TOPIC: ${{ github.event.inputs.topic }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "Add how-to: $TOPIC" -m "Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>"
            git push
          fi
